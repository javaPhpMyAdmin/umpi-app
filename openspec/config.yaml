# openspec/config.yaml
schema: spec-driven

context: |
  Expo SDK 54 + React Native 0.81 + TypeScript 5.9 + React 19.1
  Expo Router (file-based routing), Supabase auth + database, TanStack React Query
  Metro bundler, path alias @/* -> project root
  Spanish-language classifieds marketplace (Argentina locale, es-AR prices)
  Components: default exports, functional, StyleSheet.create at bottom
  UI: Spanish (Argentina), prices use es-AR formatting
  Execution mode: interactive, Delivery: ask-always

delivery:
  strategy: ask-always
  review_budget_lines: 800

language:
  artifacts: en-US
  ui: es-AR

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: ""
    build_command: "npm run typecheck"
  verify:
    test_command: ""
    build_command: "npm run typecheck"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

testing:
  strict_tdd: false
  runner:
    framework: none
    command: ""
  layers:
    unit: { available: false, tool: null }
    integration: { available: false, tool: null }
    e2e: { available: false, tool: null }
  coverage:
    available: false
    command: ""
  quality:
    linter: { available: true, command: npm run lint }
    type_checker: { available: true, command: npm run typecheck }
    formatter: { available: true, command: npm run format }
